name: run test suite

on: [push]

jobs:
  run-tests:
    runs-on: [self-hosted, ARM64] 
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
    
      - name: uv sync
        run: uv sync

      - name: run tests
        run: uv run pytest tests/integration/intercomclient/test_video_pipeline.py
