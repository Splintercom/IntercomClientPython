name: run test suite

on: 
  push:
    branches: [master]

jobs:
  run-tests:
    runs-on: [ubuntu-22.04-arm] 
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
    
      - name: uv sync
        run: uv sync

      - name: run tests
        run: uv run pytest
