name: Deploy .deb to Raspberry Pi

on:
  workflow_run:
    workflows: ["Build .deb Package for Raspberry Pi"]
    branches: [master]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "The run_id of the build workflow whose artifact to install"
        required: true
        type: string

env:
  PKG_NAME: intercom-client
  PKG_DEPENDS: "libgstreamer1.0-0, gstreamer1.0-plugins-base, gstreamer1.0-plugins-good, libv4l-0"

jobs:
  deploy:
    name: Install on Raspberry Pi
    runs-on: ["self-hosted", "pi4"]
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Determine run ID
        id: run_id
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download .deb artifact from build run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.run_id.outputs.id }}"
          echo "Downloading artifact from run ${RUN_ID}..."
          gh run download "${RUN_ID}" -n intercom-client-deb -d dist/
          echo ""
          echo "--- Downloaded artifact ---"
          ls -lh dist/

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ${PKG_DEPENDS}

      - name: Install .deb package
        run: |
          set -euo pipefail
          DEB_FILE=$(ls dist/intercom-client_*.deb)
          echo "Installing: ${DEB_FILE}"
          sudo dpkg -i "${DEB_FILE}" || sudo apt-get install -f -y

      - name: Enable and start intercom-client service
        run: |
          set -euo pipefail
          sudo systemctl daemon-reload
          sudo systemctl enable intercom-client
          sudo systemctl restart intercom-client
          echo ""
          echo "--- Service status ---"
          sudo systemctl status intercom-client --no-pager

      - name: Verify service is active
        run: |
          systemctl is-active intercom-client
          echo "intercom-client service is running."
